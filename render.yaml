services:
  - type: web
    name: exam-help-rag
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: VECTOR_DB_PATH
        value: /tmp/examprep-rag/vector_store
      - key: DATABASE_URL
        value: sqlite:////tmp/examprep-rag/examprep.sqlite3
      - key: UPLOAD_DIR
        value: /tmp/examprep-rag/uploads
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: CHUNK_SIZE
        value: "900"
      - key: CHUNK_OVERLAP
        value: "125"
