services:
  - type: web
    name: examprep-rag-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: VECTOR_DB_PATH
        value: /tmp/examprep-rag/vector_store
      - key: DATABASE_URL
        value: sqlite:////tmp/examprep-rag/examprep.sqlite3
      - key: UPLOAD_DIR
        value: /tmp/examprep-rag/uploads
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: CHUNK_SIZE
        value: "900"
      - key: CHUNK_OVERLAP
        value: "125"
      - key: FRONTEND_ORIGIN
        fromService:
          type: web
          name: examprep-rag-web
          property: host

  - type: web
    name: examprep-rag-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: examprep-rag-api
          property: host
